name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        with:
          host: 34.134.235.242
          username: daniel
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd card-games
            git pull
            sudo docker stop $(sudo docker ps -q) || true
            sudo docker build -t card-games .
            sudo docker run -d -p 80:3000 -v /data:/app/data --restart unless-stopped card-games
